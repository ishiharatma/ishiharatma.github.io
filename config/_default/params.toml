# -- Theme Options --
# colorScheme を変更するだけで全体の色が変わります
# 選択肢: blowfish, avocado, fire, ocean, slate, forest, princess, neon, bloody, terminal, marvel, noir, autumn, congo, strawberry
colorScheme = "slate"
defaultAppearance = "dark"   # light or dark
autoSwitchAppearance = true  # ブラウザの設定に従って自動切替

enableSearch = true
enableCodeCopy = true
mainSections = []

disableImageOptimization = false
fingerprintAlgorithm = "sha512"

[header]
  layout = "fixed"

[footer]
  showMenu = false
  showCopyright = true
  showThemeAttribution = false
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "profile"
  showRecent = false
  cardView = false

[article]
  showDate = true
  showDateUpdated = false
  showAuthor = false
  showHero = false
  showBreadcrumbs = true
  showDraftLabel = false
  showEdit = false
  showHeadingAnchors = true
  showPagination = false
  showReadingTime = false
  showTableOfContents = true
  showRelatedContent = false
  showTaxonomies = false

[list]
  showHero = false
  showBreadcrumbs = false
  showSummary = false
  showTableOfContents = false
  showCards = false
  groupByYear = false
  cardView = false
